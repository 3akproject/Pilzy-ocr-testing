name: pilzy
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  shared_preferences: ^2.2.3
  file_picker: ^8.0.0
  path_provider: ^2.1.2
  open_file: ^3.3.2
  sqflite: ^2.3.3
  path: ^1.9.0
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.2
  audioplayers: ^6.0.0
  android_intent_plus: ^5.0.2
  permission_handler: ^12.0.1
  intl: ^0.18.1
  cupertino_icons: ^1.0.8

  # ── OCR / Prescription scanning ──────────────────────────────────────────
  image_picker: ^1.0.7
  google_mlkit_text_recognition: ^0.13.0

  flutter:
    sdk: flutter

dev_dependencies:
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.4
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo.png
    - assets/audios/samsung.mp3

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/images/logo.png
  android: true
  ios: true
  web: false
  android_12:
    color: "#FFFFFF"
    image: assets/images/logo.png

flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21
